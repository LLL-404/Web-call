                _isJoining = false;
            }
        }

        /**
         * 通过 MQTT 备用通道加入房间
         * 当 PeerJS 信令服务器不可用时自动调用
         * 流程：连接 MQTT（多 broker 依次尝试）-> 订阅主持人主题 -> 发送介绍 -> 建立 WebRTC 连接
         * @param {string} hostPeerId - 主持人的 PeerJS ID
         */
        async function joinRoomViaMQTT(hostPeerId) {
            showToast('PeerJS 不可用，正在切换备用通道...', 'warning');
            const connected = await initMQTT();
            if (!connected) {
                showToast('所有信令通道均不可用，请检查网络后刷新重试', 'error');
                $('connectingOverlay').classList.remove('visible');
                setStatus('连接失败', '');
                showView('landing');
                return;
            }

            // 生成一个临时 ID
            myPeerId = PEER_PREFIX + generateRoomId() + '-guest';
            participants.set(myPeerId, { name: myDisplayName, isHost: false, isMicOn: false, isCamOn: false });

            // 订阅主持人的主题（接收主持人的消息）
            mqttSubscribe(hostPeerId);
            // 订阅自己的主题（接收其他参会者的消息）
            mqttSubscribe(myPeerId);

            // 向主持人发送自我介绍
            mqttSend(hostPeerId, {
                type: 'introduce',
                from: myPeerId,
                data: { name: myDisplayName, isMicOn: false, isCamOn: false }
            });

            // 添加主持人到参会者列表
            participants.set(hostPeerId, { name: '主持人', isHost: true, isMicOn: false, isCamOn: false });
            renderParticipantList();
            updateParticipantCount();

            // 发起 WebRTC 呼叫
            setStatus('正在呼叫 (备用通道)...', 'waiting');
            mqttCall(hostPeerId);

            console.log('[MQTT] 已加入房间:', hostPeerId);
        }

        // ===== 处理新 Data Connection =====

        /**
         * 处理新的数据通道连接
         * 当有参会者通过 peer.connect() 连接到自己时触发
         * 负责注册消息监听、发送参会者列表、转发已有成员信息
         * @param {DataConnection} conn - PeerJS 数据连接对象
         */
        function handleNewConnection(conn) {
            conn.on('open', () => {
                const peerId = conn.peer;
                if (peers.has(peerId)) {
                    // 已有连接（可能是先收到了 call），更新 conn 引用
                    peers.get(peerId).conn = conn;
                } else {
                    // 新连接，创建记录
                    peers.set(peerId, { conn, call: null, remoteStream: null });
                }

                // 注册数据消息监听
                conn.on('data', (data) => handleDataMessage(peerId, data));
                // 连接关闭时清理
                conn.on('close', () => removePeer(peerId));

                // 如果自己是主持人，向新成员发送完整的参会者列表
                if (isHost) {
                    const list = {};
                    participants.forEach((v, k) => { list[k] = v; });
                    conn.send({ type: 'participant-list', list });
                }

                // 向新成员介绍所有已有的其他参会者（mesh 拓扑同步）
                participants.forEach((info, pid) => {
                    if (pid !== peerId && pid !== myPeerId) {
                        conn.send({ type: 'introduce', data: { name: info.name, isMicOn: info.isMicOn, isCamOn: info.isCamOn } });
                    }
                });
            });
        }

        // ===== 处理来电 =====

        /**
         * 处理传入的媒体通话请求
         * 当有参会者通过 peer.call() 呼叫自己时触发
         * 检查人数限制后接听，并建立双向数据通道（如果尚未建立）
         * @param {MediaConnection} call - PeerJS 媒体连接对象
         */
        function handleIncomingCall(call) {
            const peerId = call.peer;

            // 检查是否已达到最大参会人数
            if (participants.size >= MAX_PARTICIPANTS) {
                showToast('会议已满（最多 ' + MAX_PARTICIPANTS + ' 人）', 'error');
                call.close();
                return;
            }

            // 接听通话，传入本地媒体流
            call.answer(localStream);

            // 更新连接记录
            if (peers.has(peerId)) {
                peers.get(peerId).call = call;
            } else {
                peers.set(peerId, { conn: null, call, remoteStream: null });
            }

            // 处理远程流
            handleCallStream(call, peerId);

            // 如果还没有数据通道，主动建立一个（确保双向通信）
            if (!peers.get(peerId)?.conn) {
                const conn = peer.connect(peerId, { reliable: true });
                conn.on('open', () => {
                    if (peers.has(peerId)) {
                        peers.get(peerId).conn = conn;
                    }
                    // 发送自我介绍
                    conn.send({ type: 'introduce', data: { name: myDisplayName, isMicOn, isCamOn } });
                    conn.on('data', (data) => handleDataMessage(peerId, data));
                    conn.on('close', () => removePeer(peerId));
                });
            }
        }

        // ===== 处理通话流 =====

        /**
         * 处理媒体通话的远程流
         * 当收到对方的视频/音频流时，更新视频元素和 UI
         * 第一次收到流时，隐藏连接中覆盖层并启动计时器
         * 设置 30 秒超时，防止连接一直处于等待状态
         * @param {MediaConnection} call - PeerJS 媒体连接对象
         * @param {string} peerId - 对应参会者的 PeerJS ID
         */
        function handleCallStream(call, peerId) {
            // 收到远程媒体流
            call.on('stream', (remoteStream) => {
                // 保存远程流引用
                if (peers.has(peerId)) {
                    peers.get(peerId).remoteStream = remoteStream;
                }

                // 更新视频元素
                const videoEl = $('video-' + peerId);
                if (videoEl) {
                    videoEl.srcObject = remoteStream;
                }
                // 隐藏占位符
                const placeholder = $('placeholder-' + peerId);
                if (placeholder) placeholder.style.display = 'none';

                // 第一次收到流：进入会议状态
                if ($('connectingOverlay').classList.contains('visible')) {
                    $('connectingOverlay').classList.remove('visible');
                    showView('meeting');
                    setStatus('通话中', 'connected');
                    startTimer();
                    showToast('连接成功', 'success');
                }

                // 刷新视频网格和参会者列表
                renderVideoGrid();
                renderParticipantList();
                updateParticipantCount();
            });

            // 通话关闭时清理该参会者
            call.on('close', () => removePeer(peerId));
            // 通话出错时清理该参会者
            call.on('error', (err) => {
                console.error('Call error:', err);
                removePeer(peerId);
            });

            // 连接超时保护：30秒内未收到流则自动挂断
            setTimeout(() => {
                if ($('connectingOverlay').classList.contains('visible')) {
                    $('connectingOverlay').classList.remove('visible');
                    showToast('连接超时', 'error');
                    hangUp();
                }
            }, 30000);
        }

        // ===== 移除 Peer =====

        /**
         * 移除指定参会者
         * 关闭与该参会者的所有连接，从列表中移除，刷新 UI
         * 如果只剩自己一人，停止通话计时器
         * @param {string} peerId - 要移除的参会者 PeerJS ID
         */
        function removePeer(peerId) {
            const info = participants.get(peerId);
            if (info) showToast(`${info.name} 离开了会议`);
            // 关闭媒体连接和数据连接
            const data = peers.get(peerId);
            if (data) {
                if (data.call) data.call.close();
                if (data.conn) data.conn.close();
            }
            // 从映射中删除
            peers.delete(peerId);
            participants.delete(peerId);
            // 刷新 UI
            renderVideoGrid();
            renderParticipantList();
            updateParticipantCount();

            // 如果只剩自己一人且通话已开始，停止计时器
            if (participants.size <= 1 && callStartTime) {
                stopTimer();
            }
        }

        // ===== 挂断 =====

        /**
         * 挂断通话并重置所有状态
         * 关闭所有连接、停止媒体流、销毁 PeerJS 实例
         * 重置所有状态变量和 UI 元素，返回着陆页
         */
        function hangUp() {
            stopTimer();
            $('connectingOverlay').classList.remove('visible');
            $('sidebar').classList.remove('visible');

            // 关闭所有 peer 连接
            peers.forEach(({ call, conn }) => {
                if (call) call.close();
                if (conn) conn.close();
            });
            peers.clear();
            participants.clear();

            // 停止本地媒体流的所有轨道
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = new MediaStream();
            }
            // 销毁 PeerJS 实例
            if (peer) { peer.destroy(); peer = null; }

            // 断开 MQTT 备用通道
            if (mqttClient) {
                mqttClient.end(true);
                mqttClient = null;
            }
            mqttPeers.forEach(({ pc }) => pc.close());
            mqttPeers.clear();
            signalingMode = 'peerjs';
            clearTimeout(peerjsTimeout);

            // 重置所有状态变量
            isMicOn = false;
            isCamOn = false;
            isHost = false;
            roomId = null;
            myPeerId = null;
            _isTogglingMic = false;
            _isTogglingCam = false;
            _isCreating = false;
            _isJoining = false;

            // 重置控制按钮 UI
            $('micBtn').classList.remove('active');
            $('micBtn').innerHTML = '🔇<span class="tooltip">麦克风已关闭</span>';
            $('camBtn').classList.remove('active');
            $('camBtn').innerHTML = '🚫<span class="tooltip">摄像头已关闭</span>';

            // 返回着陆页
            showView('landing');
            setStatus('未连接', '');
            // 清除 URL 中的 hash
            history.replaceState(null, '', window.location.pathname);
        }

        // ===== 侧边栏 =====

        /**
         * 切换参会者侧边栏的显示/隐藏
         */
        function toggleSidebar() {
            $('sidebar').classList.toggle('visible');
        }

        // ===== 复制链接 =====

        /**
         * 复制房间链接到剪贴板
         * 优先使用 Clipboard API，失败时回退到 execCommand
         * 复制成功后按钮文字临时变为"已复制"
         */
        async function copyLink() {
            try {
                await navigator.clipboard.writeText($('shareLink').value);
                const btn = $('copyBtn');
                btn.textContent = '已复制 ✓';
                btn.classList.add('copied');
                showToast('链接已复制', 'success');
                // 2秒后恢复按钮文字
                setTimeout(() => { btn.textContent = '复制链接'; btn.classList.remove('copied'); }, 2000);
            } catch {
                // Clipboard API 不可用时的降级方案
                $('shareLink').select();
                document.execCommand('copy');
                showToast('链接已复制', 'success');
            }
        }

        // ===== 初始化 =====

        // 页面加载完成后，检查 URL hash 是否包含房间链接，自动加入
        window.addEventListener('load', () => {
            const hash = window.location.hash.slice(1);
            if (hash && hash.startsWith(PEER_PREFIX)) {
                joinFromHash();
            }
        });

        // 页面关闭前自动挂断，释放资源
        window.addEventListener('beforeunload', () => hangUp());
    </script>
</body>
</html>
